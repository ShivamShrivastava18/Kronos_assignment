services:
  api:
    build: .
    image: synthgen-api:latest
    container_name: synthgen-api
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: synthgen-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - api
    restart: unless-stopped
